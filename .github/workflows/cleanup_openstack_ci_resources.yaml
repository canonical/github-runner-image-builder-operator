name: Cleanup OpenStack CI resources

on:
  schedule:
    # Every 6 hours UTC
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      min-age-hours:
        description: Minimum resource age in hours before deletion
        required: false
        default: "6"
      apply:
        description: Actually delete (true) or dry-run (false)
        required: false
        default: "true"

concurrency:
  group: cleanup-openstack-ci-resources
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  cleanup:
    name: Cleanup (${{ matrix.arch }})
    runs-on: self-hosted-linux-amd64-noble-private-endpoint-small
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64, s390x, ppc64le]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install openstacksdk
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user 'openstacksdk>=3.0.0'

      # Secrets cannot be keyed dynamically from matrix; one export step per arch.
      - name: Export credentials (amd64)
        if: matrix.arch == 'amd64'
        run: |
          {
            echo "OS_PASSWORD<<EOF"
            echo "${{ secrets.OPENSTACK_PASSWORD_AMD64 }}"
            echo "EOF"
            echo "INTEGRATION_ARGS<<EOF"
            echo "${{ secrets.INTEGRATION_TEST_ARGS_APP_AMD64 }}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Export credentials (arm64)
        if: matrix.arch == 'arm64'
        run: |
          {
            echo "OS_PASSWORD<<EOF"
            echo "${{ secrets.OPENSTACK_PASSWORD_ARM64 }}"
            echo "EOF"
            echo "INTEGRATION_ARGS<<EOF"
            echo "${{ secrets.INTEGRATION_TEST_ARGS_APP_ARM64 }}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Export credentials (s390x)
        if: matrix.arch == 's390x'
        run: |
          {
            echo "OS_PASSWORD<<EOF"
            echo "${{ secrets.OPENSTACK_PASSWORD_S390X }}"
            echo "EOF"
            echo "INTEGRATION_ARGS<<EOF"
            echo "${{ secrets.INTEGRATION_TEST_ARGS_APP_S390X }}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Export credentials (ppc64le)
        if: matrix.arch == 'ppc64le'
        run: |
          {
            echo "OS_PASSWORD<<EOF"
            echo "${{ secrets.OPENSTACK_PASSWORD_PPC64LE }}"
            echo "EOF"
            echo "INTEGRATION_ARGS<<EOF"
            echo "${{ secrets.INTEGRATION_TEST_ARGS_APP_PPC64LE }}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Map integration args to OS_* and clean up
        env:
          OS_IDENTITY_API_VERSION: "3"
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          export PATH="${HOME}/.local/bin:${PATH}"

          if [ -z "${OS_PASSWORD:-}" ]; then
            echo "Skipping ${ARCH}: OPENSTACK_PASSWORD not configured."
            exit 0
          fi

          # Parse the same CLI flags tox/integration tests receive, e.g.
          #   --openstack-auth-url-amd64=https://... --openstack-project-name-amd64=...
          # Emit shell export lines for the current process.
          eval "$(
            ARCH="${ARCH}" INTEGRATION_ARGS="${INTEGRATION_ARGS:-}" python3 - <<'PY'
          import os, re, shlex
          args = os.environ.get("INTEGRATION_ARGS", "")
          arch = os.environ["ARCH"].lower()
          tokens = shlex.split(args) if args.strip() else []
          mapping = {
              "auth_url": "OS_AUTH_URL",
              "project_domain_name": "OS_PROJECT_DOMAIN_NAME",
              "project_name": "OS_PROJECT_NAME",
              "user_domain_name": "OS_USER_DOMAIN_NAME",
              "username": "OS_USERNAME",
              "region_name": "OS_REGION_NAME",
          }
          values: dict[str, str] = {}
          i = 0
          while i < len(tokens):
              t = tokens[i]
              if not t.startswith("--openstack-"):
                  i += 1
                  continue
              body = t[len("--openstack-") :]
              if "=" in body:
                  key, val = body.split("=", 1)
              else:
                  key = body
                  i += 1
                  val = tokens[i] if i < len(tokens) else ""
              key = re.sub(rf"-{re.escape(arch)}$", "", key).replace("-", "_")
              if key in mapping and val:
                  values[mapping[key]] = val
              i += 1
          for env_name, val in values.items():
              # single-quote with safe escaping for eval
              escaped = val.replace("'", "'\"'\"'")
              print(f"export {env_name}='{escaped}'")
          PY
          )"

          if [ -z "${OS_AUTH_URL:-}" ] || [ -z "${OS_PROJECT_NAME:-}" ] || [ -z "${OS_USERNAME:-}" ]; then
            echo "Skipping ${ARCH}: missing OpenStack auth after mapping INTEGRATION_TEST_ARGS_APP_*."
            echo "Need OS_AUTH_URL, OS_PROJECT_NAME, OS_USERNAME (plus OS_PASSWORD already set)."
            exit 0
          fi

          echo "Cleaning OpenStack project=${OS_PROJECT_NAME} arch=${ARCH}"

          MIN_AGE="${{ github.event.inputs.min-age-hours || '6' }}"
          APPLY="${{ github.event.inputs.apply || 'true' }}"
          extra_flags=(--min-age-hours "${MIN_AGE}" --aggressive-keypairs --json-summary)
          if [ "${APPLY}" = "true" ]; then
            extra_flags+=(--apply)
          fi
          python3 scripts/cleanup_openstack_ci_resources.py -v "${extra_flags[@]}"
